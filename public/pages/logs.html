<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📋 Logs - REGIX GOD MODE 🔥</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
<script>
        if (sessionStorage.getItem("regix_auth") !== "true" && !sessionStorage.getItem("regix_access")) {
          window.location.replace("/login.html");
        }
      </script>
    
    <div class="scene-container">
      <canvas id="threeCanvas"></canvas>
    </div>
    
    <div class="dashboard">
      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <div class="logo-icon small">
              <svg viewBox="0 0 40 40" fill="none">
                <rect x="2" y="2" width="36" height="36" rx="8" stroke="#ff1a1a" stroke-width="3" fill="none" />
                <path d="M12 20 L18 26 L28 14" stroke="#ff1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="brand-text">
              <h2>🔥 REGIX</h2>
              <span class="brand-sub">⚡ GOD MODE v3.0</span>
            </div>
            <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
          </div>
        </div>
        <div class="sidebar-user">
          <div class="user-avatar" id="userAvatar">👤</div>
          <div class="user-info">
            <span class="user-name" id="userName">admin</span>
            <span class="user-role" id="userRole">👑 Owner</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item" data-page="overview"><span class="nav-icon">📊</span><span class="nav-label">Overview</span></button>
          <button class="nav-item" data-page="words"><span class="nav-icon">📝</span><span class="nav-label">Word List</span></button>
          <button class="nav-item" data-page="violations"><span class="nav-icon">⚠️</span><span class="nav-label">Violations</span></button>
          <button class="nav-item" data-page="commands"><span class="nav-icon">⚙️</span><span class="nav-label">Commands</span></button>
          <button class="nav-item active" data-page="logs"><span class="nav-icon">📋</span><span class="nav-label">Activity Logs</span></button>
          <button class="nav-item" data-page="users" id="usersNavItem"><span class="nav-icon">👥</span><span class="nav-label">Users</span></button>
          <button class="nav-item" data-page="settings"><span class="nav-icon">🔧</span><span class="nav-label">Settings</span></button>
          <button class="nav-item logout" id="logoutBtn"><span class="nav-icon">🚪</span><span class="nav-label">Logout</span></button>
        </nav>
      </aside>
      <nav class="bottom-nav" id="bottomNav">
        <button class="bnav-item" data-page="overview">📊</button>
        <button class="bnav-item" data-page="words">📝</button>
        <button class="bnav-item" data-page="violations">⚠️</button>
        <button class="bnav-item" data-page="commands">⚙️</button>
        <button class="bnav-item active" data-page="logs">📋</button>
      </nav>
      <main class="main-content">
        <div class="mobile-header">
          <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
          <h1>🔥 REGIX</h1>
          <div class="header-time-mobile" id="headerTimeMobile">--:--</div>
        </div>
        <div class="main-header">
          <h1>📋 <span>Activity Logs</span> 🔍</h1>
          <div class="header-time" id="headerTime">--:--:-- 🕐</div>
        </div>
        
        <div class="section">
          <div class="section-header"><h2>📊 <span>Log Statistics</span></h2></div>
          <div class="stats-grid" id="logStats">
            <div class="stat-card">📝<div class="stat-label">Total Logs</div><div class="stat-value" id="logTotal">0</div></div>
            <div class="stat-card">👤<div class="stat-label">Active Users</div><div class="stat-value" id="logUsers">0</div></div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-header"><h2>📋 <span>Recent Logs</span></h2></div>
          <div class="form-group" style="display:flex;gap:0.5rem;margin-bottom:1rem;">
            <button class="btn-outline" onclick="exportLogs('json')">📥 Export JSON</button>
            <button class="btn-outline" onclick="exportLogs('csv')">📥 Export CSV</button>
            <button class="btn-glow" id="clearLogsBtn" style="margin-left:auto">🗑️ Clear All</button>
          </div>
          <div class="table-wrapper">
            <table>
              <thead><tr><th>🕐 Time</th><th>👤 User</th><th>🔧 Action</th><th>📝 Details</th></tr></thead>
              <tbody id="logsTableBody"><tr><td colspan="4" class="loading-cell">⏳ Loading... 🔄</td></tr></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="/app.js"></script>
    <script src="/three-init.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const canvas = document.getElementById('threeCanvas');
        if (canvas && typeof initParticles === 'function') {
          initParticles(canvas);
        }
      });
    </script>
    <script>
      async function loadLogs() {
        const data = await api.get('/logs');
        const tbody = document.getElementById('logsTableBody');
        
        if (!data.logs || data.logs.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">✨ No logs recorded</td></tr>';
        } else {
          tbody.innerHTML = data.logs.map(log => `
            <tr>
              <td>${new Date(log.timestamp).toLocaleString()}</td>
              <td>${log.user}</td>
              <td>${log.action}</td>
              <td>${log.details}</td>
            </tr>
          `).join('');
        }
        
        const stats = await api.get('/logs/stats');
        document.getElementById('logTotal').textContent = stats.total || 0;
        document.getElementById('logUsers').textContent = stats.topUsers?.length || 0;
      }
      
      async function exportLogs(format) {
        window.open(`/api/logs/export?format=${format}`, '_blank');
      }
      
      document.getElementById('clearLogsBtn').addEventListener('click', async () => {
        if (!confirm('Clear ALL logs?')) return;
        const result = await api.delete('/logs');
        if (result.success) {
          showToast('✅ All logs cleared', 'success');
          loadLogs();
        }
      });
      
      document.addEventListener('DOMContentLoaded', loadLogs);
    </script>
  </body>
</html>
