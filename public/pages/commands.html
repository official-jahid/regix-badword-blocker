<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚙️ Commands - REGIX GOD MODE 🔥</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <canvas id="particleCanvas"></canvas>
    <script>
      if (sessionStorage.getItem("regix_auth") !== "true" && !sessionStorage.getItem("regix_access")) {
        window.location.replace("../index.html");
      }
    </script>
    <div class="dashboard">
      <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">
            <div class="logo-icon small">
              <svg viewBox="0 0 40 40" fill="none">
                <rect x="2" y="2" width="36" height="36" rx="8" stroke="#ff1a1a" stroke-width="3" fill="none" />
                <path d="M12 20 L18 26 L28 14" stroke="#ff1a1a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="brand-text">
              <h2>🔥 REGIX</h2>
              <span class="brand-sub">⚡ GOD MODE v2.0</span>
            </div>
          </div>
          <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">✕</button>
        </div>
        <div class="sidebar-user">
          <div class="user-avatar" id="userAvatar">👤</div>
          <div class="user-info">
            <span class="user-name" id="userName">admin</span>
            <span class="user-role" id="userRole">👑 Owner</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item" data-page="overview"><span class="nav-icon">📊</span><span class="nav-label">Overview</span></button>
          <button class="nav-item" data-page="words"><span class="nav-icon">📝</span><span class="nav-label">Word List</span></button>
          <button class="nav-item" data-page="violations"><span class="nav-icon">⚠️</span><span class="nav-label">Violations</span></button>
          <button class="nav-item active" data-page="commands"><span class="nav-icon">⚙️</span><span class="nav-label">Commands</span></button>
          <button class="nav-item" data-page="logs"><span class="nav-icon">📋</span><span class="nav-label">Activity Logs</span></button>
          <button class="nav-item" data-page="users" id="usersNavItem"><span class="nav-icon">👥</span><span class="nav-label">Users</span></button>
          <button class="nav-item" data-page="settings"><span class="nav-icon">🔧</span><span class="nav-label">Settings</span></button>
        </nav>
        <div class="sidebar-footer">
          <button class="nav-item logout" id="logoutBtn"><span class="nav-icon">🚪</span><span class="nav-label">Logout</span></button>
        </div>
      </aside>
      <nav class="bottom-nav" id="bottomNav">
        <button class="bnav-item" data-page="overview">📊</button>
        <button class="bnav-item" data-page="words">📝</button>
        <button class="bnav-item" data-page="violations">⚠️</button>
        <button class="bnav-item active" data-page="commands">⚙️</button>
        <button class="bnav-item" data-page="logs">📋</button>
      </nav>
      <main class="main-content">
        <div class="mobile-header">
          <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu"><span></span><span></span><span></span></button>
          <h1>🔥 REGIX</h1>
          <div class="header-time-mobile" id="headerTimeMobile">--:--</div>
        </div>
        <div class="main-header">
          <h1>⚙️ Bot <span>Commands</span> 🤖</h1>
          <button class="btn btn-sm" onclick="refreshCommands()"><span>🔄</span> Refresh</button>
        </div>
        <div class="stats-grid mini">
          <div class="stat-card">🟢<div class="stat-label">Bot Status</div><div class="stat-value" id="botStatus">Online ✨</div></div>
          <div class="stat-card">⏱️<div class="stat-label">Uptime</div><div class="stat-value" id="botUptime">0s 🕐</div></div>
          <div class="stat-card">📦<div class="stat-label">Version</div><div class="stat-value" id="botVersion">2.0.0 🔥</div></div>
        </div>
        <div class="section">
          <div class="section-header">
            <h2>📋 Available <span>Commands</span> 🤖</h2>
            <p style="color: var(--text-dim); font-size: 0.85rem;">Click a command card to execute it via web control ⚙️</p>
          </div>
          <div class="commands-grid" id="commandsGrid"></div>
        </div>
      </main>
    </div>
    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="modal" id="modalContent">
        <div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="modal-close" id="modalClose">✕</button></div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="../particles.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
