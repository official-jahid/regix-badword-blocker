<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🔐 Login - REGIX GOD MODE 🔥</title>
    <link rel="stylesheet" href="/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
  </head>
  <body>
<script>
        if (sessionStorage.getItem("regix_auth") === "true" || sessionStorage.getItem("regix_access")) {
          window.location.replace("/login.html");
        }
      </script>

    <div class="scene-container">
      <canvas id="threeCanvas"></canvas>
    </div>
    
    <div class="login-page">
      <form class="login-card" id="loginForm">
        <h1>🔥 REGIX Dashboard</h1>
        <p>Enter your credentials to access the moderation panel</p>
        
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" placeholder="Enter username" required />
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter password" required />
        </div>
        
        <button type="submit" class="btn-glow" style="width: 100%">🚀 Login</button>
      </form>
    </div>
    
    <script src="three-init.js"></script>
    <script src="app.js"></script>
  </body>
</html>
